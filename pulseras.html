        <div class="swatch" style="background:#1a9e5c" data-color="#1a9e5c" onclick="window.setPriceColor('#1a9e5c',this)"></div>
        <div class="swatch" style="background:#ff6b00" data-color="#ff6b00" onclick="window.setPriceColor('#ff6b00',this)"></div>
        <div class="swatch" style="background:#1a1a1a" data-color="#1a1a1a" onclick="window.setPriceColor('#1a1a1a',this)"></div>
        <div class="swatch-custom" title="Color personalizado">
          <input type="color" id="s-price-custom" value="#8b5cf6" oninput="window.setPriceColor(this.value,null)" />
        </div>
      </div>
    </div>

    <div class="settings-group">
      <span class="settings-label">Tema</span>
      <div class="theme-grid" id="theme-grid">
        <div class="theme-card active" data-theme="light" onclick="window.setTheme('light',this)">
          <div class="theme-preview" style="background:linear-gradient(135deg,#f5f5f5,#fff)"></div>
          <span class="theme-name">☀️ Claro</span>
        </div>
        <div class="theme-card" data-theme="dark" onclick="window.setTheme('dark',this)">
          <div class="theme-preview" style="background:linear-gradient(135deg,#141414,#1e1e1e)"></div>
          <span class="theme-name">🌙 Oscuro</span>
        </div>
        <div class="theme-card" data-theme="warm" onclick="window.setTheme('warm',this)">
          <div class="theme-preview" style="background:linear-gradient(135deg,#faf7f2,#f3ede4)"></div>
          <span class="theme-name">🍂 Cálido</span>
        </div>
        <div class="theme-card" data-theme="mint" onclick="window.setTheme('mint',this)">
          <div class="theme-preview" style="background:linear-gradient(135deg,#f0faf5,#d8f0e4)"></div>
          <span class="theme-name">🌿 Menta</span>
        </div>
      </div>
    </div>

    <div class="settings-actions">
      <button class="btn-save" onclick="window.saveSettings()">💾 Guardar</button>
      <button class="btn-reset" onclick="window.resetSettings()">↺ Resetear</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDLk5Gu-wY7kb9MdR5UIBtbgJTyFUGAtnA",
      authDomain: "gestor-de-inventario-853d8.firebaseapp.com",
      projectId: "gestor-de-inventario-853d8",
      storageBucket: "gestor-de-inventario-853d8.firebasestorage.app",
      messagingSenderId: "980977651129",
      appId: "1:980977651129:web:791dd31e9b2825c4d57a68"
    };

    const PAGE_CATEGORY = 'pulseras';
    const WA_NUMBER = '522281103615';
    const STORAGE_KEY = 'talara_pulseras_settings';

    const THEMES = {
      light: { bg:'#f5f5f5', surface:'#ffffff', surface2:'#f0f0f0', border:'#e8e8e8', text:'#1a1a1a', textMuted:'#888' },
      dark:  { bg:'#141414', surface:'#1e1e1e', surface2:'#272727', border:'#333',    text:'#f0f0f0', textMuted:'#999' },
      warm:  { bg:'#faf7f2', surface:'#ffffff', surface2:'#f3ede4', border:'#e0d5c5', text:'#1a1a1a', textMuted:'#7a6e5f' },
      mint:  { bg:'#f0faf5', surface:'#ffffff', surface2:'#d8f0e4', border:'#b8e4cc', text:'#1a1a1a', textMuted:'#4a7a5f' },
    };

    const DEFAULT_SETTINGS = {
      storeName: 'TALARA',
      primaryColor: '#8b5cf6',
      priceColor: '#8b5cf6',
      theme: 'light',
      bannerData: null,
      logoData: null,
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);

    let products = [];
    let cart = {};
    let searchQuery = '';
    let settings = { ...DEFAULT_SETTINGS };

    function catNorm(c) {
      if (!c) return '';
      const s = c.toString().toLowerCase().trim();
      if (s === 'dulce') return 'dulces';
      if (s === 'pulsera') return 'pulseras';
      return s;
    }

    onSnapshot(collection(db, 'products'), snap => {
      products = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(p => (p.stock || 0) > 0 && catNorm(p.category) === PAGE_CATEGORY);
      render();
      renderCart();
    }, err => {
      document.getElementById('product-grid').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Error al cargar</h3><p>${err.message}</p></div>`;
    });

    function fmt(n) {
      const num = parseFloat(n) || 0;
      return '$' + num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function render() {
      const grid = document.getElementById('product-grid');
      const count = document.getElementById('product-count');
      const q = searchQuery.toLowerCase();
      const filtered = q ? products.filter(p => (p.name||'').toLowerCase().includes(q) || (p.desc||'').toLowerCase().includes(q)) : products;

      count.textContent = filtered.length === 0 ? 'Sin productos disponibles' : `${filtered.length} producto${filtered.length !== 1 ? 's' : ''} disponible${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📿</div><h3>Sin pulseras por ahora</h3><p>Vuelve pronto, ¡hay más diseños en camino!</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const imgHtml = p.img
          ? `<img src="${p.img}" alt="${p.name||''}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="card-img-placeholder" style="display:none">📿</div>`
          : `<div class="card-img-placeholder">📿</div>`;
        return `
          <div class="product-card" onclick="window.openProduct('${p.id}')">
            <div class="card-img-wrap">
              ${imgHtml}
              <button class="add-btn" onclick="event.stopPropagation();window.addToCart('${p.id}')">+</button>
            </div>
            <div class="card-body">
              <div class="card-handmade">✦ Pieza única</div>
              <div class="card-name">${p.name || 'Sin nombre'}</div>
              <div class="card-price">${fmt(p.sellPrice)}</div>
              ${p.desc ? `<div class="card-desc">${p.desc}</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function renderCart() {
      const items = document.getElementById('cart-items');
      const badge = document.getElementById('cart-badge');
      const total = document.getElementById('cart-total');
      const waBtn = document.getElementById('wa-btn');
      const keys = Object.keys(cart).filter(k => cart[k] > 0);

      const totalQty = keys.reduce((s, k) => s + cart[k], 0);
      badge.textContent = totalQty;
      badge.style.display = totalQty > 0 ? 'flex' : 'none';

      if (keys.length === 0) {
        items.innerHTML = `<div class="cart-empty-msg"><span class="e">📿</span>Tu carrito está vacío</div>`;
        total.textContent = '$0.00';
        waBtn.disabled = true;
        return;
      }

      waBtn.disabled = false;
      let sum = 0;
      items.innerHTML = keys.map(id => {
        const p = products.find(x => x.id === id);
        if (!p) return '';
        const subtotal = (parseFloat(p.sellPrice) || 0) * cart[id];
        sum += subtotal;
        const imgEl = p.img
          ? `<img class="cart-item-img" src="${p.img}" alt="${p.name||''}" onerror="this.outerHTML='<div class=cart-item-img style=font-size:1.8rem>📿</div>'" />`
          : `<div class="cart-item-img" style="font-size:1.8rem">📿</div>`;
        return `
          <div class="cart-item">
            ${imgEl}
            <div class="cart-item-info">
              <div class="cart-item-name">${p.name || 'Producto'}</div>
              <div class="cart-item-price">${fmt(p.sellPrice)} c/u</div>
              <div class="cart-item-qty">
                <button class="qty-btn" onclick="window.changeQty('${id}',-1)">−</button>
                <span class="qty-num">${cart[id]}</span>
                <button class="qty-btn" onclick="window.changeQty('${id}',1)">+</button>
              </div>
            </div>
          </div>`;
      }).join('');
      total.textContent = fmt(sum);
    }

    window.onSearch = () => { searchQuery = document.getElementById('search-input').value; render(); };
    window.openCart = () => { document.getElementById('cart-panel').classList.add('open'); document.getElementById('cart-overlay').classList.add('open'); };
    window.closeCart = () => { document.getElementById('cart-panel').classList.remove('open'); document.getElementById('cart-overlay').classList.remove('open'); };
    window.addToCart = (id) => { cart[id] = (cart[id] || 0) + 1; renderCart(); showToast('📿 Añadido al carrito'); };
    window.changeQty = (id, delta) => { cart[id] = Math.max(0, (cart[id] || 0) + delta); if (cart[id] === 0) delete cart[id]; renderCart(); };
    window.openProduct = (id) => { const p = products.find(x => x.id === id); if (p) window.addToCart(id); };

    window.sendWhatsApp = () => {
      const keys = Object.keys(cart).filter(k => cart[k] > 0);
      if (!keys.length) return;
      let msg = '¡Hola! Quiero pedir pulseras de TALARA:\n\n';
      let total = 0;
      keys.forEach(id => {
        const p = products.find(x => x.id === id);
        if (!p) return;
        const sub = (parseFloat(p.sellPrice) || 0) * cart[id];
        total += sub;
        msg += `• ${p.name} x${cart[id]} = ${fmt(sub)}\n`;
      });
      msg += `\n*Total: ${fmt(total)}*`;
      window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
    };

    function applySettings(s) {
      const root = document.documentElement;
      root.style.setProperty('--primary', s.primaryColor);
      root.style.setProperty('--price-color', s.priceColor);
      const t = THEMES[s.theme] || THEMES.light;
      root.style.setProperty('--bg', t.bg);
      root.style.setProperty('--surface', t.surface);
      root.style.setProperty('--surface2', t.surface2);
      root.style.setProperty('--border', t.border);
      root.style.setProperty('--text', t.text);
      root.style.setProperty('--text-muted', t.textMuted);
      const logo = document.getElementById('header-logo');
      if (s.logoData) {
        logo.innerHTML = `<img src="${s.logoData}" alt="${s.storeName||'TALARA'}" style="height:38px;max-width:120px;object-fit:contain;border-radius:6px"/>`;
      } else {
        logo.textContent = (s.storeName || 'TALARA') + ' 📿';
      }
      const banner = document.getElementById('custom-banner');
      if (s.bannerData) { banner.src = s.bannerData; banner.style.display = 'block'; }
      else { banner.style.display = 'none'; }
    }

    function syncSettingsUI() {
      document.getElementById('s-store-name').value = settings.storeName || 'TALARA';
      document.getElementById('s-primary-custom').value = settings.primaryColor;
      document.getElementById('s-price-custom').value = settings.priceColor;
      document.querySelectorAll('#primary-swatches .swatch').forEach(s => s.classList.toggle('active', s.dataset.color === settings.primaryColor));
      document.querySelectorAll('#price-swatches .swatch').forEach(s => s.classList.toggle('active', s.dataset.color === settings.priceColor));
      document.querySelectorAll('#theme-grid .theme-card').forEach(c => c.classList.toggle('active', c.dataset.theme === settings.theme));
      if (settings.bannerData) {
        const prev = document.getElementById('s-banner-preview');
        prev.src = settings.bannerData; prev.style.display = 'block';
      }
    }

    window.openSettings = () => { document.getElementById('settings-panel').classList.add('open'); document.getElementById('settings-overlay').classList.add('open'); };
    window.closeSettings = () => { document.getElementById('settings-panel').classList.remove('open'); document.getElementById('settings-overlay').classList.remove('open'); };

    window.livePreview = () => { settings.storeName = document.getElementById('s-store-name').value; applySettings(settings); };

    window.setPrimary = (color, el) => {
      settings.primaryColor = color;
      document.querySelectorAll('#primary-swatches .swatch').forEach(s => s.classList.remove('active'));
      if (el) el.classList.add('active');
      document.getElementById('s-primary-custom').value = color;
      applySettings(settings);
    };

    window.setPriceColor = (color, el) => {
      settings.priceColor = color;
      document.querySelectorAll('#price-swatches .swatch').forEach(s => s.classList.remove('active'));
      if (el) el.classList.add('active');
      document.getElementById('s-price-custom').value = color;
      applySettings(settings);
    };

    window.setTheme = (theme, el) => {
      settings.theme = theme;
      document.querySelectorAll('#theme-grid .theme-card').forEach(c => c.classList.remove('active'));
      if (el) el.classList.add('active');
      applySettings(settings);
    };

    window.onLogoUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        settings.logoData = ev.target.result;
        const prev = document.getElementById('s-logo-preview');
        prev.src = ev.target.result; prev.style.display = 'block';
        document.getElementById('s-logo-remove').style.display = 'inline-block';
        applySettings(settings);
      };
      reader.readAsDataURL(file);
    };

    window.removeLogo = () => {
      settings.logoData = null;
      const prev = document.getElementById('s-logo-preview');
      prev.src = ''; prev.style.display = 'none';
      document.getElementById('s-logo-remove').style.display = 'none';
      document.getElementById('s-logo-upload').value = '';
      applySettings(settings);
    };

    window.onBannerUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        settings.bannerData = ev.target.result;
        const prev = document.getElementById('s-banner-preview');
        prev.src = ev.target.result; prev.style.display = 'block';
        applySettings(settings);
      };
      reader.readAsDataURL(file);
    };

    window.saveSettings = () => {
      settings.storeName = document.getElementById('s-store-name').value;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(settings)); } catch(e) {}
      setDoc(doc(db, 'tienda_settings', 'pulseras'), settings, { merge: true }).catch(console.error);
      applySettings(settings);
      showToast('✅ Configuración guardada');
      window.closeSettings();
    };

    window.resetSettings = () => {
      settings = { ...DEFAULT_SETTINGS };
      try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
      setDoc(doc(db, 'tienda_settings', 'pulseras'), settings).catch(console.error);
      applySettings(settings);
      syncSettingsUI();
      showToast('↺ Configuración restablecida');
    };

    function showToast(msg) {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 2600);
    }

    async function loadSettings() {
      try {
        const snap = await getDoc(doc(db, 'tienda_settings', 'pulseras'));
        if (snap.exists()) {
          settings = { ...DEFAULT_SETTINGS, ...snap.data() };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
        } else {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) settings = { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
        }
      } catch(e) {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) settings = { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
      }
      applySettings(settings);
      syncSettingsUI();
    }

    loadSettings();
  </script>
</body>
</html>
