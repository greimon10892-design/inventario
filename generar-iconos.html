<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generar Iconos PWA</title></head>
<body style="font-family:sans-serif;padding:24px;background:#141414;color:#f0ece6">
  <h2>Generador de Iconos PWA</h2>
  <p>Haz clic en cada botón para descargar el icono.</p>
  <br>
  <button onclick="gen(192,'icono-192.png')" style="padding:12px 24px;margin-right:12px;background:#e07b39;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem">
    Descargar icono-192.png
  </button>
  <button onclick="gen(512,'icono-512.png')" style="padding:12px 24px;background:#e07b39;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem">
    Descargar icono-512.png
  </button>
  <canvas id="c" style="display:none"></canvas>
  <script>
    function gen(size, filename) {
      const canvas = document.getElementById('c');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      // Fondo naranja con esquinas redondeadas
      const r = size * 0.2;
      ctx.fillStyle = '#e07b39';
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size-r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size-r);
      ctx.quadraticCurveTo(size, size, size-r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size-r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();
      // Letra I centrada
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + Math.round(size*0.55) + 'px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('I', size/2, size/2 + size*0.03);
      // Descarga con el nombre correcto
      const a = document.createElement('a');
      a.download = filename;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
