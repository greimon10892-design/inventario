<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dulces &amp; Pulseras Artesanales</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#e07b39;
  --orange-light:#f09050;
  --orange-dark:#c0622a;
  --bg:#141414;
  --surface:#1e1e1e;
  --surface2:#272727;
  --border:#333;
  --text:#f0f0f0;
  --text-muted:#999;
  --green:#25d366;
  --green-dark:#1da851;
  --radius:14px;
  --shadow:0 4px 24px rgba(0,0,0,.45);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── HERO ── */
.hero{
  background:linear-gradient(135deg,#1a0a00 0%,#2d1200 40%,#1a0a00 100%);
  padding:60px 20px 50px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(224,123,57,.18) 0%,transparent 70%);
  pointer-events:none;
}
.hero-emoji{font-size:2.8rem;margin-bottom:12px;display:block;filter:drop-shadow(0 2px 8px rgba(224,123,57,.5))}
.hero h1{
  font-size:clamp(1.8rem,5vw,3rem);
  font-weight:800;
  background:linear-gradient(135deg,#f5c07a,var(--orange),#e05a20);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.15;
  margin-bottom:10px;
}
.hero p{color:#c8a07a;font-size:1.05rem;font-weight:500;letter-spacing:.02em}

/* ── TOOLBAR ── */
.toolbar{
  position:sticky;top:0;z-index:100;
  background:rgba(20,20,20,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
}
.search-wrap{flex:1;min-width:160px;position:relative}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
#search{
  width:100%;padding:9px 12px 9px 36px;
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:inherit;font-size:.9rem;outline:none;
  transition:border-color .2s;
}
#search:focus{border-color:var(--orange)}
#search::placeholder{color:var(--text-muted)}
.cats{display:flex;gap:6px;flex-wrap:wrap}
.cat-btn{
  padding:7px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-muted);
  font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.cat-btn:hover{border-color:var(--orange);color:var(--orange)}
.cat-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}

/* ── CATALOG & SECTIONS ── */
.catalog{padding:24px 16px 120px;max-width:1100px;margin:0 auto}
.cat-section{margin-bottom:40px}
.cat-section-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:18px;
  padding-bottom:12px;
  border-bottom:2px solid var(--border);
}
.cat-section-header.dulces-header  { border-color:rgba(224,123,57,.5); }
.cat-section-header.pulseras-header{ border-color:rgba(167,139,250,.5); }
.cat-section-emoji{font-size:1.8rem;line-height:1}
.cat-section-title{
  font-size:1.2rem;font-weight:800;letter-spacing:-.02em;color:var(--text);
}
.cat-section-count{
  margin-left:auto;font-size:.75rem;font-weight:600;
  color:var(--text-muted);background:var(--surface2);
  padding:3px 10px;border-radius:20px;border:1px solid var(--border);
}
.section-title{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
}
@media(min-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:20px}}

/* ── CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;display:flex;flex-direction:column;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  cursor:default;
}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--orange)}
.card-img{
  width:100%;aspect-ratio:1/1;object-fit:cover;
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  font-size:3.5rem;
}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-name{font-size:.92rem;font-weight:700;line-height:1.3;color:var(--text)}
.card-desc{font-size:.78rem;color:var(--text-muted);line-height:1.4;flex:1}
.card-price{font-size:1.1rem;font-weight:800;color:var(--orange)}
.card-footer{padding:0 12px 12px}
.add-btn{
  width:100%;padding:9px;border-radius:9px;border:none;
  background:var(--orange);color:#fff;font-family:inherit;font-size:.88rem;font-weight:700;
  cursor:pointer;transition:background .2s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.add-btn:hover{background:var(--orange-light)}
.add-btn:active{transform:scale(.97)}
.add-btn.in-cart{background:var(--surface2);border:1px solid var(--orange);color:var(--orange)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty span{font-size:3rem;display:block;margin-bottom:12px}
.empty p{font-size:.95rem}

/* ── FLOATING CART BTN ── */
#cart-fab{
  position:fixed;bottom:24px;right:20px;z-index:200;
  width:58px;height:58px;border-radius:50%;border:none;
  background:var(--orange);color:#fff;font-size:1.5rem;
  cursor:pointer;box-shadow:0 6px 24px rgba(224,123,57,.5);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s,background .2s;
}
#cart-fab:hover{background:var(--orange-light);transform:scale(1.08)}
#cart-fab:active{transform:scale(.95)}
#cart-badge{
  position:absolute;top:-4px;right:-4px;
  background:#e03030;color:#fff;font-size:.65rem;font-weight:800;
  min-width:20px;height:20px;border-radius:10px;padding:0 5px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
  transition:transform .2s;
}
#cart-badge.hidden{display:none}
#cart-badge.pop{animation:pop .25s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}

/* ── CART PANEL ── */
#cart-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#cart-overlay.open{opacity:1;pointer-events:all}
#cart-panel{
  position:fixed;right:0;top:0;bottom:0;z-index:301;
  width:min(420px,100vw);
  background:var(--surface);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 40px rgba(0,0,0,.5);
}
#cart-panel.open{transform:translateX(0)}
.cart-header{
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cart-header h2{font-size:1.1rem;font-weight:700}
.cart-close{
  background:var(--surface2);border:none;color:var(--text);
  width:34px;height:34px;border-radius:50%;font-size:1.1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.cart-close:hover{background:var(--border)}
.cart-items{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.cart-items::-webkit-scrollbar{width:4px}
.cart-items::-webkit-scrollbar-track{background:transparent}
.cart-items::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.cart-empty{text-align:center;padding:40px 0;color:var(--text-muted)}
.cart-empty span{font-size:2.5rem;display:block;margin-bottom:8px}
.cart-row{
  display:flex;align-items:center;gap:12px;
  background:var(--surface2);border-radius:10px;padding:10px 12px;
}
.cart-row-emoji{font-size:1.6rem;flex-shrink:0}
.cart-row-info{flex:1;min-width:0}
.cart-row-name{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-row-price{font-size:.8rem;color:var(--orange);font-weight:700}
.cart-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{
  width:28px;height:28px;border-radius:7px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:1rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
}
.qty-btn:hover{background:var(--orange);border-color:var(--orange)}
.qty-num{font-size:.9rem;font-weight:700;min-width:18px;text-align:center}
.cart-footer{
  padding:16px 20px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:12px;
}
.cart-total-row{display:flex;justify-content:space-between;align-items:center}
.cart-total-label{font-size:.9rem;color:var(--text-muted);font-weight:600}
.cart-total-val{font-size:1.4rem;font-weight:800;color:var(--orange)}
.wa-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:var(--green);color:#fff;font-family:inherit;font-size:1rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .2s,transform .1s;
  box-shadow:0 4px 16px rgba(37,211,102,.3);
}
.wa-btn:hover{background:var(--green-dark)}
.wa-btn:active{transform:scale(.98)}
.wa-btn svg{flex-shrink:0}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);border:1px solid var(--orange);color:var(--text);
  padding:10px 20px;border-radius:30px;font-size:.85rem;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  z-index:400;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <span class="hero-emoji">🍬✨📿</span>
  <h1>Dulces &amp; Pulseras Artesanales</h1>
  <p>Sabores y colores que enamoran</p>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="search" placeholder="Buscar producto…" autocomplete="off"/>
  </div>
  <div class="cats">
    <button class="cat-btn active" data-cat="">Todos</button>
    <button class="cat-btn" data-cat="dulces">🍬 Dulces</button>
    <button class="cat-btn" data-cat="pulseras">📿 Pulseras</button>
  </div>
</div>

<!-- CATALOG -->
<main class="catalog">
  <p class="section-title" id="result-label">Cargando productos…</p>
  <div id="catalog-sections"></div>
  <div class="empty hidden" id="empty-state">
    <span>🔍</span>
    <p>No se encontraron productos.</p>
  </div>
</main>

<!-- FLOATING CART BUTTON -->
<button id="cart-fab" aria-label="Ver carrito" onclick="openCart()">
  🛒
  <span id="cart-badge" class="hidden">0</span>
</button>

<!-- CART OVERLAY -->
<div id="cart-overlay" onclick="closeCart()"></div>

<!-- CART PANEL -->
<aside id="cart-panel" role="dialog" aria-label="Carrito de compras">
  <div class="cart-header">
    <h2>🛒 Tu pedido</h2>
    <button class="cart-close" onclick="closeCart()" aria-label="Cerrar carrito">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cart-total">$0.00</span>
    </div>
    <button class="wa-btn" onclick="sendWhatsApp()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Pedir por WhatsApp
    </button>
  </div>
</aside>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

'use strict';

// ── FIREBASE CONFIG ────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDLk5Gu-wY7kb9MdR5UIBtbgJTyFUGAtnA",
  authDomain: "gestor-de-inventario-853d8.firebaseapp.com",
  projectId: "gestor-de-inventario-853d8",
  storageBucket: "gestor-de-inventario-853d8.firebasestorage.app",
  messagingSenderId: "980977651129",
  appId: "1:980977651129:web:791dd31e9b2825c4d57a68"
};

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

// ── STATE ──────────────────────────────────────────────
let products = [];
let cart = {}; // { id: qty }
let activeCat = '';
let searchQ = '';

// ── HELPERS ────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => '$' + Number(n).toFixed(2);

function catNorm(c) {
  if (!c) return '';
  const s = c.toString().toLowerCase().trim();
  if (s === 'dulce')   return 'dulces';
  if (s === 'pulsera') return 'pulseras';
  return s;
}

function emoji(cat) {
  const c = catNorm(cat);
  if (c === 'dulces')   return '🍬';
  if (c === 'pulseras') return '📿';
  return '🛍️';
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── RENDER CATALOG ─────────────────────────────────────
function cardHTML(p) {
  const inCart = cart[p.id] > 0;
  const imgHtml = p.img
    ? `<img src="${escHtml(p.img)}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.parentElement.innerHTML='${emoji(p.category)}'"/>`
    : emoji(p.category);
  return `
  <article class="card" data-id="${p.id}">
    <div class="card-img">${imgHtml}</div>
    <div class="card-body">
      <div class="card-name">${escHtml(p.name)}</div>
      ${p.desc ? `<div class="card-desc">${escHtml(p.desc)}</div>` : ''}
      <div class="card-price">${fmt(p.sellPrice)}</div>
    </div>
    <div class="card-footer">
      <button class="add-btn${inCart ? ' in-cart' : ''}" onclick="addToCart('${p.id}')">
        ${inCart ? '✓ En carrito' : '＋ Agregar'}
      </button>
    </div>
  </article>`;
}

function render() {
  const sectionsEl = $('catalog-sections');
  const emptyEl    = $('empty-state');
  const label      = $('result-label');

  // Filtrar por búsqueda
  const q = searchQ.toLowerCase();
  let list = products.filter(p => {
    const matchCat = !activeCat || catNorm(p.category) === activeCat;
    const matchQ   = !q ||
      (p.name     || '').toLowerCase().includes(q) ||
      (p.desc     || '').toLowerCase().includes(q) ||
      (p.category || '').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  label.textContent = list.length
    ? list.length + ' producto' + (list.length !== 1 ? 's' : '')
    : '';

  if (!list.length) {
    sectionsEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  const dulces   = list.filter(p => catNorm(p.category) === 'dulces');
  const pulseras = list.filter(p => catNorm(p.category) === 'pulseras');
  const otros    = list.filter(p => catNorm(p.category) !== 'dulces' && catNorm(p.category) !== 'pulseras');

  let html = '';

  if (dulces.length) {
    html += `
    <section class="cat-section" id="sec-dulces">
      <div class="cat-section-header dulces-header">
        <span class="cat-section-emoji">🍬</span>
        <span class="cat-section-title">Dulces Típicos</span>
        <span class="cat-section-count">${dulces.length} producto${dulces.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="grid">${dulces.map(cardHTML).join('')}</div>
    </section>`;
  }

  if (pulseras.length) {
    html += `
    <section class="cat-section" id="sec-pulseras">
      <div class="cat-section-header pulseras-header">
        <span class="cat-section-emoji">📿</span>
        <span class="cat-section-title">Pulseras Artesanales</span>
        <span class="cat-section-count">${pulseras.length} producto${pulseras.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="grid">${pulseras.map(cardHTML).join('')}</div>
    </section>`;
  }

  if (otros.length) {
    html += `
    <section class="cat-section" id="sec-otros">
      <div class="cat-section-header">
        <span class="cat-section-emoji">🛍️</span>
        <span class="cat-section-title">Otros productos</span>
        <span class="cat-section-count">${otros.length} producto${otros.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="grid">${otros.map(cardHTML).join('')}</div>
    </section>`;
  }

  sectionsEl.innerHTML = html;
}

// ── CART LOGIC ─────────────────────────────────────────
function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateBadge();
  render();
  renderCartPanel();
  const p = products.find(x => x.id === id);
  showToast((p ? emoji(p.category) + ' ' + p.name : 'Producto') + ' agregado');
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  updateBadge();
  render();
  renderCartPanel();
}

function cartTotal() {
  return Object.entries(cart).reduce((sum, [id, qty]) => {
    const p = products.find(x => x.id === id);
    return sum + (p ? Number(p.sellPrice) * qty : 0);
  }, 0);
}

function cartCount() {
  return Object.values(cart).reduce((a, b) => a + b, 0);
}

function updateBadge() {
  const badge = $('cart-badge');
  const n = cartCount();
  if (n > 0) {
    badge.textContent = n > 99 ? '99+' : n;
    badge.classList.remove('hidden');
    badge.classList.remove('pop');
    void badge.offsetWidth;
    badge.classList.add('pop');
  } else {
    badge.classList.add('hidden');
  }
}

function renderCartPanel() {
  const container = $('cart-items');
  const totalEl   = $('cart-total');
  const entries   = Object.entries(cart).filter(([, q]) => q > 0);

  if (!entries.length) {
    container.innerHTML = `<div class="cart-empty"><span>🛒</span><p>Tu carrito está vacío</p></div>`;
    totalEl.textContent = '$0.00';
    return;
  }

  container.innerHTML = entries.map(([id, qty]) => {
    const p = products.find(x => x.id === id);
    if (!p) return '';
    const lineTotal = fmt(Number(p.sellPrice) * qty);
    return `
    <div class="cart-row">
      <span class="cart-row-emoji">${emoji(p.category)}</span>
      <div class="cart-row-info">
        <div class="cart-row-name">${escHtml(p.name)}</div>
        <div class="cart-row-price">${fmt(p.sellPrice)} × ${qty} = ${lineTotal}</div>
      </div>
      <div class="cart-qty">
        <button class="qty-btn" onclick="changeQty('${id}',-1)" aria-label="Quitar uno">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${id}',1)" aria-label="Agregar uno">+</button>
      </div>
    </div>`;
  }).join('');

  totalEl.textContent = fmt(cartTotal());
}

// ── CART PANEL OPEN/CLOSE ──────────────────────────────
function openCart() {
  renderCartPanel();
  $('cart-panel').classList.add('open');
  $('cart-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  $('cart-panel').classList.remove('open');
  $('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── WHATSAPP ───────────────────────────────────────────
function sendWhatsApp() {
  const entries = Object.entries(cart).filter(([, q]) => q > 0);
  if (!entries.length) { showToast('Tu carrito está vacío 😅'); return; }

  const lines = entries.map(([id, qty]) => {
    const p = products.find(x => x.id === id);
    if (!p) return '';
    return `${emoji(p.category)} ${p.name} x${qty} — ${fmt(Number(p.sellPrice) * qty)}`;
  }).filter(Boolean);

  const total = fmt(cartTotal());
  const msg = `Hola! Me gustaría hacer el siguiente pedido:\n\n${lines.join('\n')}\n\nTotal: ${total}\n\n¿Está disponible?`;
  const url = `https://wa.me/522281103615?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// ── TOAST ──────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── FILTERS ────────────────────────────────────────────
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    render();
    // Scroll a la sección si se seleccionó una categoría
    if (activeCat) {
      const secId = activeCat === 'dulces' ? 'sec-dulces' : activeCat === 'pulseras' ? 'sec-pulseras' : null;
      if (secId) {
        setTimeout(() => {
          const el = document.getElementById(secId);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 50);
      }
    }
  });
});

$('search').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

// ── EXPOSE GLOBALS (for inline onclick handlers) ───────
window.addToCart   = addToCart;
window.changeQty   = changeQty;
window.openCart    = openCart;
window.closeCart   = closeCart;
window.sendWhatsApp = sendWhatsApp;

// ── FIREBASE REAL-TIME LISTENER ────────────────────────
onSnapshot(
  collection(db, 'products'),
  snap => {
    products = snap.docs
      .map(doc => ({ id: doc.id, ...doc.data() }))
      .filter(p => Number(p.stock) > 0);
    render();
  },
  err => {
    console.error('Firebase error:', err);
    $('result-label').textContent = 'Error al cargar productos.';
    $('grid').innerHTML = '';
    $('empty-state').classList.remove('hidden');
    $('empty-state').innerHTML = '<span>⚠️</span><p>No se pudo conectar con la base de datos.</p>';
  }
);
</script>
</body>
</html>
