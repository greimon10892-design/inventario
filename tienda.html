  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: #ffffff;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo {
      font-size: 1.5rem; font-weight: 900;
      letter-spacing: -0.5px; color: #1a9e5c;
      text-decoration: none;
    }
    .nav-logo span { color: #ff6b00; }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #f0faf5 0%, #fff8f0 100%);
      padding: 40px 20px;
      text-align: center;
      width: 100%;
    }
    .hero-title {
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 900; letter-spacing: -2px; line-height: 1;
      margin-bottom: 10px;
    }
    .hero-title .green  { color: #1a9e5c; }
    .hero-title .purple { color: #8b5cf6; }

    /* CATALOGO GRID */
    .catalog-section {
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .section-title {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: #ffffff;
      border: 1.5px solid #e8e8e8;
      border-radius: 20px;
      padding: 15px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border-color: #8b5cf6;
    }

    .img-container {
      width: 100%;
      height: 250px;
      background: #f5f5f5;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 15px;
    }
    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 100px;
      background: #f3eeff;
      color: #7c3aed;
      margin-bottom: 10px;
      align-self: flex-start;
    }

    .product-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .product-desc {
      font-size: 0.85rem;
      color: #666;
      line-height: 1.4;
      margin-bottom: 15px;
      flex-grow: 1;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .price {
      font-size: 1.25rem;
      font-weight: 900;
      color: #1a1a1a;
    }

    .btn-ws {
      background: #25d366;
      color: white;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 700;
      transition: background 0.2s;
    }
    .btn-ws:hover {
      background: #128c7e;
    }

    footer {
      background: #1a1a1a;
      color: #aaa;
      text-align: center;
      padding: 30px;
      margin-top: 50px;
    }
    .heart { color: #ff6b00; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">TAL<span>A</span>RA</a>
  </nav>

  <section class="hero">
    <h1 class="hero-title">
      <span class="green">Colección</span> <span class="purple">Pulseras</span>
    </h1>
    <p>Diseños exclusivos hechos a mano para resaltar tu estilo.</p>
  </section>

  <main class="catalog-section">
    <h2 class="section-title">20 Modelos Exclusivos</h2>
    
    <div class="cards-grid">
      
      <div class="product-card">
        <div class="img-container">
          <img src="pulsera1.jpg" alt="Pulsera Artesanal">
        </div>
        <span class="badge">PIEZA ÚNICA</span>
        <h3 class="product-title">Nombre de Pulsera 1</h3>
        <p class="product-desc">Descripción breve del material y estilo (ej. Ojo turco con cristales).</p>
        <div class="price-row">
          <span class="price">$000</span>
          <a href="https://wa.me/522281103615?text=Hola%20TALARA,%20me%20interesa%20la%20Pulsera%201" class="btn-ws">Pedir 👋</a>
        </div>
      </div>
      </div>
  </main>

  <footer>
    <p><strong>TALARA</strong> &nbsp;·&nbsp; Joyería con <span class="heart">♥</span> amor</p>
  </footer>

</body>
</html>
