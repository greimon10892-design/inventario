<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TALARA — Tienda</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a9e5c;
  --green-dk:#14794a;
  --green-lt:#22b868;
  --orange:#ff6b00;
  --orange-lt:#ff8533;
  --bg:#f5f5f5;
  --surface:#ffffff;
  --surface2:#f0f0f0;
  --border:#e8e8e8;
  --text:#1a1a1a;
  --text-muted:#888;
  --wa:#25d366;
  --wa-dk:#1da851;
  --radius:10px;
  --shadow:0 2px 16px rgba(0,0,0,.10);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.site-header{
  position:sticky;top:0;z-index:100;
  background:#fff;
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.07);
  padding:0 16px;
}
.header-top{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;
  max-width:1200px;margin:0 auto;
}
.logo{
  font-size:1.35rem;font-weight:800;color:var(--green);
  letter-spacing:-.02em;white-space:nowrap;text-decoration:none;flex-shrink:0;
}
.logo span{color:var(--orange)}
.search-wrap{flex:1;position:relative;max-width:560px;margin:0 auto}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
#search{
  width:100%;padding:10px 14px 10px 38px;
  background:var(--bg);border:1.5px solid var(--border);border-radius:24px;
  color:var(--text);font-family:inherit;font-size:.9rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
#search:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,158,92,.12)}
#search::placeholder{color:var(--text-muted)}
.cart-icon-btn{
  position:relative;background:none;border:none;cursor:pointer;
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:background .2s;flex-shrink:0;
}
.cart-icon-btn:hover{background:var(--bg)}
.cart-icon-btn svg{color:var(--text)}
#cart-badge{
  position:absolute;top:2px;right:2px;
  background:var(--orange);color:#fff;font-size:.6rem;font-weight:800;
  min-width:18px;height:18px;border-radius:9px;padding:0 4px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;transition:transform .2s;
}
#cart-badge.hidden{display:none}
#cart-badge.pop{animation:pop .25s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}

/* ── CATEGORY TABS ── */
.cat-tabs{
  display:flex;gap:8px;align-items:center;
  padding:8px 0 10px;overflow-x:auto;scrollbar-width:none;
  max-width:1200px;margin:0 auto;
}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-btn{
  padding:7px 18px;border-radius:24px;border:1.5px solid var(--border);
  background:#fff;color:var(--text-muted);
  font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all .18s;flex-shrink:0;
}
.cat-btn:hover{border-color:var(--green);color:var(--green)}
.cat-btn.active{background:var(--green);border-color:var(--green);color:#fff}

/* ── CATALOG ── */
.catalog{padding:20px 16px 100px;max-width:1200px;margin:0 auto}
.cat-section{margin-bottom:36px}
.sec-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:2px solid var(--border);
}
.sec-header.dulces-hdr{border-color:#ffd27a}
.sec-header.pulseras-hdr{border-color:#a3e0c0}
.sec-emoji{font-size:1.6rem;line-height:1}
.sec-title{font-size:1.1rem;font-weight:800;color:var(--text)}
.sec-count{
  margin-left:auto;font-size:.72rem;font-weight:600;
  color:var(--text-muted);background:var(--surface2);
  padding:3px 10px;border-radius:20px;
}
.result-label{font-size:.78rem;color:var(--text-muted);font-weight:500;margin-bottom:14px}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
@media(min-width:540px){.grid{grid-template-columns:repeat(3,1fr);gap:12px}}
@media(min-width:860px){.grid{grid-template-columns:repeat(4,1fr);gap:14px}}
@media(min-width:1100px){.grid{gap:16px}}

/* ── CARD ── */
.card{
  background:#fff;border-radius:var(--radius);
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 1px 6px rgba(0,0,0,.07);
  transition:box-shadow .2s,transform .2s;
}
.card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}

.card-img-wrap{
  position:relative;
  width:100%;aspect-ratio:1/1;
  background:var(--surface2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:3.5rem;
}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.add-circle{
  position:absolute;bottom:8px;right:8px;
  width:34px;height:34px;border-radius:50%;
  background:var(--green);border:none;color:#fff;
  font-size:1.3rem;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(26,158,92,.4);
  transition:background .18s,transform .15s;
  flex-shrink:0;
}
.add-circle:hover{background:var(--green-lt)}
.add-circle:active{transform:scale(.9)}
.add-circle.in-cart{background:#e0f4ec;color:var(--green);border:2px solid var(--green)}

.card-body{padding:8px 10px 10px;flex:1;display:flex;flex-direction:column;gap:4px}
.card-name{
  font-size:.82rem;font-weight:600;line-height:1.35;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-price{font-size:1.05rem;font-weight:800;color:var(--orange);margin-top:2px}
.card-tag{font-size:.68rem;color:var(--text-muted);font-weight:500}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty span{font-size:3rem;display:block;margin-bottom:12px}
.empty p{font-size:.95rem}
.hidden{display:none!important}

/* ── CART OVERLAY ── */
#cart-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.4);backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#cart-overlay.open{opacity:1;pointer-events:all}

/* ── CART PANEL ── */
#cart-panel{
  position:fixed;right:0;top:0;bottom:0;z-index:301;
  width:min(400px,100vw);background:#fff;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);
  box-shadow:-4px 0 32px rgba(0,0,0,.12);
}
#cart-panel.open{transform:translateX(0)}

.cart-header{
  padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.cart-header h2{font-size:1rem;font-weight:700;color:var(--text)}
.cart-close{
  background:var(--bg);border:none;color:var(--text);
  width:32px;height:32px;border-radius:50%;font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.cart-close:hover{background:var(--border)}
.cart-items{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.cart-items::-webkit-scrollbar{width:3px}
.cart-items::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cart-empty{text-align:center;padding:40px 0;color:var(--text-muted)}
.cart-empty span{font-size:2.5rem;display:block;margin-bottom:8px}
.cart-empty p{font-size:.88rem}

.cart-row{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border-radius:8px;padding:10px 12px;
}
.cart-row-thumb{
  width:46px;height:46px;border-radius:6px;flex-shrink:0;
  background:var(--surface2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
}
.cart-row-thumb img{width:100%;height:100%;object-fit:cover}
.cart-row-info{flex:1;min-width:0}
.cart-row-name{font-size:.83rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.cart-row-price{font-size:.78rem;color:var(--orange);font-weight:700;margin-top:2px}
.cart-qty{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qty-btn{
  width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);
  background:#fff;color:var(--text);font-size:.95rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
}
.qty-btn:hover{background:var(--green);border-color:var(--green);color:#fff}
.qty-num{font-size:.88rem;font-weight:700;min-width:18px;text-align:center}

.cart-footer{
  padding:14px 18px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:10px;background:#fff;
}
.cart-total-row{display:flex;justify-content:space-between;align-items:center}
.cart-total-label{font-size:.88rem;color:var(--text-muted);font-weight:600}
.cart-total-val{font-size:1.35rem;font-weight:800;color:var(--text)}

.wa-btn{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:var(--wa);color:#fff;font-family:inherit;font-size:.95rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .18s,transform .1s;
  box-shadow:0 3px 12px rgba(37,211,102,.35);
}
.wa-btn:hover{background:var(--wa-dk)}
.wa-btn:active{transform:scale(.98)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;
  padding:10px 20px;border-radius:30px;font-size:.82rem;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  z-index:500;white-space:nowrap;box-shadow:var(--shadow);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-top">
    <a class="logo" href="#">TALARA<span>.</span></a>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="search" placeholder="Buscar producto…" autocomplete="off"/>
    </div>
    <button class="cart-icon-btn" onclick="openCart()" aria-label="Ver carrito">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span id="cart-badge" class="hidden">0</span>
    </button>
  </div>
  <div class="cat-tabs">
    <button class="cat-btn active" data-cat="">Todos</button>
    <button class="cat-btn" data-cat="dulces">🍬 Dulces</button>
    <button class="cat-btn" data-cat="pulseras">📿 Pulseras</button>
  </div>
</header>

<!-- CATALOG -->
<main class="catalog">
  <p class="result-label hidden" id="result-label"></p>
  <div id="catalog-sections"></div>
  <div class="empty hidden" id="empty-state">
    <span>🔍</span>
    <p>No se encontraron productos.</p>
  </div>
</main>

<!-- CART OVERLAY -->
<div id="cart-overlay" onclick="closeCart()"></div>

<!-- CART PANEL -->
<aside id="cart-panel" role="dialog" aria-label="Carrito de compras">
  <div class="cart-header">
    <h2>🛒 Tu pedido</h2>
    <button class="cart-close" onclick="closeCart()" aria-label="Cerrar carrito">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cart-total">$0.00</span>
    </div>
    <button class="wa-btn" onclick="sendWhatsApp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Pedir por WhatsApp
    </button>
  </div>
</aside>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

'use strict';

// ── FIREBASE CONFIG ────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDLk5Gu-wY7kb9MdR5UIBtbgJTyFUGAtnA",
  authDomain: "gestor-de-inventario-853d8.firebaseapp.com",
  projectId: "gestor-de-inventario-853d8",
  storageBucket: "gestor-de-inventario-853d8.firebasestorage.app",
  messagingSenderId: "980977651129",
  appId: "1:980977651129:web:791dd31e9b2825c4d57a68"
};

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

// ── STATE ──────────────────────────────────────────────
let products = [];
let cart = {};
let activeCat = '';
let searchQ = '';

// ── HELPERS ────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => '$' + Number(n).toFixed(2);

function catNorm(c) {
  if (!c) return '';
  const s = c.toString().toLowerCase().trim();
  if (s === 'dulce')   return 'dulces';
  if (s === 'pulsera') return 'pulseras';
  return s;
}

function emoji(cat) {
  const c = catNorm(cat);
  if (c === 'dulces')   return '🍬';
  if (c === 'pulseras') return '📿';
  return '🛍️';
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ── RENDER CATALOG ─────────────────────────────────────
function cardHTML(p) {
  const inCart = (cart[p.id] || 0) > 0;
  const imgContent = p.img
    ? `<img src="${escHtml(p.img)}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.style.display='none';this.parentElement.dataset.fb='1';this.parentElement.insertAdjacentText('beforeend','${emoji(p.category)}')"/>`
    : emoji(p.category);
  return `
<article class="card" data-id="${p.id}">
  <div class="card-img-wrap">
    ${imgContent}
    <button class="add-circle${inCart ? ' in-cart' : ''}" onclick="addToCart('${p.id}')" aria-label="Agregar al carrito">
      ${inCart ? '✓' : '+'}
    </button>
  </div>
  <div class="card-body">
    <div class="card-name">${escHtml(p.name)}</div>
    <div class="card-price">${fmt(p.sellPrice)}</div>
    <div class="card-tag">✦ Hecho a mano</div>
  </div>
</article>`;
}

function render() {
  const sectionsEl = $('catalog-sections');
  const emptyEl    = $('empty-state');
  const label      = $('result-label');

  const q = searchQ.toLowerCase();
  const list = products.filter(p => {
    const matchCat = !activeCat || catNorm(p.category) === activeCat;
    const matchQ   = !q ||
      (p.name     || '').toLowerCase().includes(q) ||
      (p.desc     || '').toLowerCase().includes(q) ||
      (p.category || '').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (list.length) {
    label.textContent = list.length + ' producto' + (list.length !== 1 ? 's' : '');
    label.classList.remove('hidden');
  } else {
    label.classList.add('hidden');
  }

  if (!list.length) {
    sectionsEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  const dulces   = list.filter(p => catNorm(p.category) === 'dulces');
  const pulseras = list.filter(p => catNorm(p.category) === 'pulseras');
  const otros    = list.filter(p => catNorm(p.category) !== 'dulces' && catNorm(p.category) !== 'pulseras');

  let html = '';

  if (dulces.length) {
    html += `
<section class="cat-section" id="sec-dulces">
  <div class="sec-header dulces-hdr">
    <span class="sec-emoji">🍬</span>
    <span class="sec-title">Dulces Típicos</span>
    <span class="sec-count">${dulces.length} producto${dulces.length !== 1 ? 's' : ''}</span>
  </div>
  <div class="grid">${dulces.map(cardHTML).join('')}</div>
</section>`;
  }

  if (pulseras.length) {
    html += `
<section class="cat-section" id="sec-pulseras">
  <div class="sec-header pulseras-hdr">
    <span class="sec-emoji">📿</span>
    <span class="sec-title">Pulseras Artesanales</span>
    <span class="sec-count">${pulseras.length} producto${pulseras.length !== 1 ? 's' : ''}</span>
  </div>
  <div class="grid">${pulseras.map(cardHTML).join('')}</div>
</section>`;
  }

  if (otros.length) {
    html += `
<section class="cat-section" id="sec-otros">
  <div class="sec-header">
    <span class="sec-emoji">🛍️</span>
    <span class="sec-title">Otros productos</span>
    <span class="sec-count">${otros.length} producto${otros.length !== 1 ? 's' : ''}</span>
  </div>
  <div class="grid">${otros.map(cardHTML).join('')}</div>
</section>`;
  }

  sectionsEl.innerHTML = html;
}

// ── CART RENDER ─────────────────────────────────────────
function renderCart() {
  const itemsEl = $('cart-items');
  const totalEl = $('cart-total');
  const badge   = $('cart-badge');

  const entries = Object.entries(cart).filter(([,qty]) => qty > 0);
  let total = 0;
  let totalQty = 0;

  if (!entries.length) {
    itemsEl.innerHTML = `<div class="cart-empty"><span>🛒</span><p>Tu carrito está vacío</p></div>`;
    totalEl.textContent = '$0.00';
    badge.classList.add('hidden');
    return;
  }

  let html = '';
  for (const [id, qty] of entries) {
    const p = products.find(x => x.id === id);
    if (!p) continue;
    const lineTotal = p.sellPrice * qty;
    total += lineTotal;
    totalQty += qty;
    const thumb = p.img
      ? `<img src="${escHtml(p.img)}" alt="${escHtml(p.name)}" onerror="this.style.display='none';this.parentElement.textContent='${emoji(p.category)}'">`
      : emoji(p.category);
    html += `
<div class="cart-row">
  <div class="cart-row-thumb">${thumb}</div>
  <div class="cart-row-info">
    <div class="cart-row-name">${escHtml(p.name)}</div>
    <div class="cart-row-price">${fmt(lineTotal)}</div>
  </div>
  <div class="cart-qty">
    <button class="qty-btn" onclick="changeQty('${id}',-1)">−</button>
    <span class="qty-num">${qty}</span>
    <button class="qty-btn" onclick="changeQty('${id}',1)">+</button>
  </div>
</div>`;
  }

  itemsEl.innerHTML = html;
  totalEl.textContent = fmt(total);

  badge.textContent = totalQty;
  badge.classList.remove('hidden');
  badge.classList.add('pop');
  setTimeout(() => badge.classList.remove('pop'), 300);
}

// ── CART ACTIONS ────────────────────────────────────────
window.addToCart = function(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  cart[id] = (cart[id] || 0) + 1;
  renderCart();
  render();
  showToast(p.name + ' añadido al carrito');
};

window.changeQty = function(id, delta) {
  cart[id] = Math.max(0, (cart[id] || 0) + delta);
  if (cart[id] === 0) delete cart[id];
  renderCart();
  render();
};

window.openCart = function() {
  $('cart-panel').classList.add('open');
  $('cart-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeCart = function() {
  $('cart-panel').classList.remove('open');
  $('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
};

// ── WHATSAPP ────────────────────────────────────────────
window.sendWhatsApp = function() {
  const entries = Object.entries(cart).filter(([,qty]) => qty > 0);
  if (!entries.length) { showToast('Tu carrito está vacío'); return; }

  let msg = '¡Hola! Quiero hacer un pedido en TALARA:\n\n';
  let total = 0;
  for (const [id, qty] of entries) {
    const p = products.find(x => x.id === id);
    if (!p) continue;
    const line = p.sellPrice * qty;
    total += line;
    msg += `• ${p.name} x${qty} — ${fmt(line)}\n`;
  }
  msg += `\n*Total: ${fmt(total)}*`;

  const url = 'https://wa.me/522281103615?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
};

// ── TOAST ────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── CATEGORY FILTER ─────────────────────────────────────
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeCat = btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
    // Scroll to section if specific category selected
    if (activeCat) {
      const sec = document.getElementById('sec-' + activeCat);
      if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});

// ── SEARCH ──────────────────────────────────────────────
$('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

// ── FIREBASE LISTENER ───────────────────────────────────
onSnapshot(collection(db, 'products'), snap => {
  products = snap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .filter(p => (p.stock || 0) > 0);

  // Preserve cart for items still in stock
  for (const id of Object.keys(cart)) {
    if (!products.find(p => p.id === id)) delete cart[id];
  }

  render();
  renderCart();
}, err => {
  console.error('Firebase error:', err);
  $('catalog-sections').innerHTML = '<p style="text-align:center;padding:40px;color:#888">Error al cargar productos.</p>';
});
</script>
</body>
</html>
